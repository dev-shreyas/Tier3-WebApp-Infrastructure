name: Infrastructure Deprovisioning

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:

  infrastructure-deprovisioning:
      name: Infrastructure Deprovisioning (VPC + EKS + IAM + ALB)
      runs-on: ubuntu-latest

      defaults:
        run:
          working-directory: Iac/Terraform/envs/dev

      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Configure AWS credentials (OIDC)
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: arn:aws:iam::426449772112:role/github-terraform-role
            aws-region: ap-southeast-2

        - name: Install Terraform
          uses: hashicorp/setup-terraform@v3

        - name: Terraform Init
          run: terraform init

        - name: Terraform plan
          run: terraform plan -out=tfplan

        - name: Terraform Destroy
          if: github.ref == 'refs/heads/main'
          run: terraform destroy -auto-approve tfplan